<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a1628;
            color: #e0e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: linear-gradient(145deg, #112240, #1a3550);
            border: 2px solid #c99700;
            border-radius: 12px;
            padding: 40px;
            width: 350px;
            text-align: center;
        }

        .login-box h2 { color: #ffc107; margin-bottom: 10px; }
        .login-box p { color: #7ec8e3; margin-bottom: 25px; font-size: 14px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #ffc107; margin-bottom: 5px; font-weight: bold; }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #1a3a5c;
            background-color: #0d2137;
            color: #e0e8f0;
            font-size: 16px;
        }

        input:focus { outline: none; border-color: #c99700; }

        .btn {
            background: linear-gradient(135deg, #c99700, #ffc107);
            color: #0a1628;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            transition: 0.3s;
        }

        .btn:hover { background: linear-gradient(135deg, #ffc107, #ffdf00); }

        .error {
            background-color: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .back-link { display: block; color: #ffc107; text-decoration: none; margin-top: 15px; font-size: 14px; }
        .back-link:hover { color: #7ec8e3; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🔐 Login</h2>
        <p>Enter your credentials</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Your username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">🔓 Login</button>
        </form>

        <p style="margin-top:15px; color:#7ec8e3;">Don't have an account? <a href="/signup" style="color:#ffc107;">Sign Up</a></p>
        <a href="/" class="back-link">← Back to Home</a>
    </div>

</body>
</html>
