<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Practice List</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a1628;
            color: #e0e8f0;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255,193,7,0.3); }
            50% { box-shadow: 0 0 20px rgba(255,215,0,0.5); }
        }

        @keyframes borderShift {
            0% { border-color: #ffc107; }
            33% { border-color: #ffd700; }
            66% { border-color: #7ec8e3; }
            100% { border-color: #ffc107; }
        }

        @keyframes equalizer {
            0%, 100% { transform: scaleY(0.4); opacity: 0.6; }
            30% { transform: scaleY(1.2); opacity: 1; }
            60% { transform: scaleY(0.7); opacity: 0.8; }
        }
        

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            background: linear-gradient(180deg, #0d2137, #112240);
            padding: 20px 30px 15px;
            text-align: center;
            border-bottom: 2px solid #1a3a5c;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #ffc107, #ffd700, #7ec8e3, #ffd700, #ffc107);
            animation: borderShift 4s linear infinite;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left { text-align: left; }
        .header-left h1 { font-size: 26px; color: #ffc107; letter-spacing: 2px; }
        .header-left p { color: #7ec8e3; font-size: 12px; margin-top: 3px; letter-spacing: 1px; }

        .equalizer {
            display: flex; gap: 2px; justify-content: center;
            align-items: flex-end; height: 16px; margin-top: 8px;
        }
        .eq-bar {
            width: 3px; background: linear-gradient(180deg, #ffc107, #ffd700);
            border-radius: 2px; animation: equalizer 0.7s ease-in-out infinite;
        }
        .eq-bar:nth-child(1) { animation-delay: 0s; }
        .eq-bar:nth-child(2) { animation-delay: 0.07s; }
        .eq-bar:nth-child(3) { animation-delay: 0.14s; }
        .eq-bar:nth-child(4) { animation-delay: 0.21s; }
        .eq-bar:nth-child(5) { animation-delay: 0.28s; }
        .eq-bar:nth-child(6) { animation-delay: 0.35s; }
        .eq-bar:nth-child(7) { animation-delay: 0.42s; }
        .eq-bar:nth-child(8) { animation-delay: 0.49s; }
        .eq-bar:nth-child(9) { animation-delay: 0.56s; }
        .eq-bar:nth-child(10) { animation-delay: 0.63s; }

        .account-area { position: relative; cursor: pointer; }
        .account-icon {
            width: 44px; height: 44px; border-radius: 50%;
            background: linear-gradient(135deg, #ffc107, #ffd700);
            color: #0a1628; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 20px; border: 2px solid #ffd700;
            transition: 0.3s; animation: glowPulse 2s ease-in-out infinite;
        }
        .account-icon:hover { border-color: #fff; box-shadow: 0 0 20px rgba(255,215,0,0.6); }
        .account-nickname { color: #ffc107; font-size: 11px; margin-top: 4px; text-align: center; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .account-dropdown { display: none; position: absolute; right: 0; top: 68px; background: linear-gradient(145deg, #0d2137, #112240); border: 2px solid #ffc107; border-radius: 12px; padding: 10px 0; min-width: 160px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .account-dropdown.show { display: block; animation: fadeIn 0.2s ease; }
        .account-dropdown a { display: block; color: #ffc107; text-decoration: none; padding: 10px 20px; font-size: 14px; transition: 0.3s; }
        .account-dropdown a:hover { background-color: #1a3a5c; color: #fff; }
        .account-dropdown .divider { border-top: 1px solid #1a3a5c; margin: 5px 0; }
        .icon-picker { display: flex; gap: 8px; padding: 10px 15px; flex-wrap: wrap; }
        .icon-option { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; transition: 0.3s; background: #1a3a5c; }
        .icon-option:hover { border-color: #ffc107; transform: scale(1.15); }
        .icon-option.selected { border-color: #ffc107; background: #c99700; }

        .side-menu {
            position: fixed; right: -185px; top: 0; width: 220px; height: 100%;
            background: linear-gradient(180deg, #0d2137, #112240);
            border-left: 2px solid #ffc107; padding-top: 20px;
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); z-index: 100;
        }
        .side-menu.open { right: 0; }
        .side-menu .menu-tab {
            position: absolute; left: -35px; top: 50%; transform: translateY(-50%);
            background: linear-gradient(135deg, #ffc107, #ffd700); color: #0a1628;
            padding: 10px 6px; cursor: pointer; font-weight: bold; font-size: 12px;
            letter-spacing: 1px; border: none; border-radius: 8px 0 0 8px; transition: 0.3s;
            width: 32px; height: 80px; display: flex; align-items: center; justify-content: center;
            text-align: center; line-height: 1.2; animation: glowPulse 2s ease-in-out infinite;
        }
        .side-menu .menu-tab:hover { background: linear-gradient(135deg, #ffd700, #ffdf00); box-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .side-menu .menu-content { padding-top: 40px; }
        .side-menu .menu-content a { display: block; color: #ffc107; text-decoration: none; padding: 12px 20px; font-size: 15px; transition: 0.3s; border-left: 3px solid transparent; }
        .side-menu .menu-content a:hover { background-color: #1a3a5c; color: #fff; border-left: 3px solid #ffc107; padding-left: 25px; }
        .side-menu .menu-content a.active { background-color: #1a3a5c; color: #fff; border-left: 3px solid #ffc107; }

        .container { max-width: 700px; margin: 0 auto; padding: 30px; animation: fadeIn 0.4s ease; }
        .practicing-section { background: linear-gradient(145deg, #0d2137, #112240); border: 2px solid #1a3a5c; border-radius: 12px; padding: 25px; min-height: 150px; }
        .practicing-section:hover { animation: borderShift 4s linear infinite; }
        .practicing-section h2 { color: #ffc107; margin-bottom: 15px; font-size: 20px; letter-spacing: 2px; }
        .practicing-list { display: flex; flex-direction: column; gap: 12px; }
        .practicing-song { background-color: #1a3a5c; color: #ffc107; padding: 15px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; font-weight: bold; border: 1px solid #c99700; }
        .practicing-song .song-info { display: flex; flex-direction: column; }
        .practicing-song .song-artist { color: #7ec8e3; font-size: 12px; font-weight: normal; }
        .remove-btn { background: transparent; border: 1px solid #c99700; color: #7ec8e3; cursor: pointer; font-size: 13px; padding: 5px 12px; border-radius: 5px; transition: 0.3s; }
        .remove-btn:hover { background-color: #ff4444; border-color: #ff4444; color: white; }
        .empty-msg { color: #7ec8e3; font-style: italic; text-align: center; padding: 40px; }
        .empty-msg a { color: #ffc107; }

        footer { background-color: #0d2137; color: #7ec8e3; text-align: center; padding: 15px; border-top: 2px solid #1a3a5c; margin-top: 40px; font-size: 12px; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <div class="header-left">
                <h1>🎯 Practice List</h1>
                <p>YOUR CURRENT SESSION</p>
            </div>
            <div class="account-area" id="accountArea">
                <div class="account-icon" id="accountIcon" onclick="toggleAccountDropdown()">👤</div>
                <div class="account-nickname" id="accountNickname">Guest</div>
                <div class="account-dropdown" id="accountDropdown">
                    <a href="/login" id="ddLogin">🔐 Login</a>
                    <a href="/signup" id="ddSignup">📝 Sign Up</a>
                    <a href="/logout" id="ddLogout" style="display:none;">🚪 Logout</a>
                    <div class="divider"></div>
                    <div style="color:#7ec8e3; font-size:11px; padding:5px 15px;">Change Icon:</div>
                    <div class="icon-picker" id="iconPicker">
                        <span class="icon-option" data-icon="🎸">🎸</span>
                        <span class="icon-option" data-icon="🎵">🎵</span>
                        <span class="icon-option" data-icon="🎧">🎧</span>
                        <span class="icon-option" data-icon="⭐">⭐</span>
                        <span class="icon-option" data-icon="🔥">🔥</span>
                        <span class="icon-option" data-icon="💀">💀</span>
                        <span class="icon-option" data-icon="🐱">🐱</span>
                        <span class="icon-option" data-icon="👤">👤</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="equalizer">
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            <div class="eq-bar"></div>
        </div>
    </header>

    <div class="side-menu" id="sideMenu">
        <button class="menu-tab" onclick="toggleMenu()">M<br>E<br>N<br>U</button>
        <div class="menu-content">
            <a href="/" id="homeLink">🏠 Home</a>
            <a href="/practice" class="active" id="practiceLink">🎯 Practice List</a>
            <a href="/login" id="loginLink">🔐 Login</a>
            <a href="/signup" id="signupLink">📝 Sign Up</a>
            <a href="/admin" id="adminLink" style="display:none;">🔧 Admin Panel</a>
            <a href="/logout" id="logoutLink" style="display:none;">🚪 Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="practicing-section">
            <h2>🎸 CURRENTLY PRACTICING</h2>
            <div class="practicing-list" id="practicingList">
                <span class="empty-msg">No tracks yet.<br>Go to <a href="/">Home</a> and hit 🎯 Practice!</span>
            </div>
        </div>
    </div>

    <footer>
        <p>🎸 GUITAR PRACTICE HUB &copy; 2025 — KEEP PLAYING</p>
    </footer>

    <script>
        function toggleAccountDropdown() { document.getElementById("accountDropdown").classList.toggle("show"); }
        document.addEventListener("click", function(e) { const area = document.getElementById("accountArea"); if (!area.contains(e.target)) document.getElementById("accountDropdown").classList.remove("show"); });
        document.getElementById("iconPicker").addEventListener("click", function(e) {
            if (e.target.classList.contains("icon-option")) {
                const icon = e.target.getAttribute("data-icon");
                document.getElementById("accountIcon").textContent = icon;
                localStorage.setItem("userIcon", icon);
                document.querySelectorAll(".icon-option").forEach(el => el.classList.remove("selected"));
                e.target.classList.add("selected");
            }
        });
        const savedIcon = localStorage.getItem("userIcon");
        if (savedIcon) {
            document.getElementById("accountIcon").textContent = savedIcon;
            document.querySelectorAll(".icon-option").forEach(el => { if (el.getAttribute("data-icon") === savedIcon) el.classList.add("selected"); });
        }

        function toggleMenu() { document.getElementById("sideMenu").classList.toggle("open"); }
        document.addEventListener("click", function(e) { const menu = document.getElementById("sideMenu"); const tab = document.querySelector(".menu-tab"); if (!menu.contains(e.target) && !tab.contains(e.target)) menu.classList.remove("open"); });

        fetch("/api/check_admin")
            .then(res => res.json())
            .then(data => {
                if (data.is_admin) document.getElementById("adminLink").style.display = "block";
                if (data.is_logged_in) {
                    document.getElementById("logoutLink").style.display = "block";
                    document.getElementById("loginLink").style.display = "none";
                    document.getElementById("signupLink").style.display = "none";
                    document.getElementById("ddLogout").style.display = "block";
                    document.getElementById("ddLogin").style.display = "none";
                    document.getElementById("ddSignup").style.display = "none";
                    document.getElementById("accountNickname").textContent = data.username || "User";
                }
            });

        function loadPracticeList() {
            const songs = JSON.parse(localStorage.getItem("practicingSongs") || "[]");
            const list = document.getElementById("practicingList");
            if (songs.length === 0) { list.innerHTML = '<span class="empty-msg">No tracks yet.<br>Go to <a href="/">Home</a> and hit 🎯 Practice!</span>'; return; }
            list.innerHTML = "";
            songs.forEach(song => {
                const item = document.createElement("div");
                item.className = "practicing-song";
                item.innerHTML = `<div class="song-info"><span>${song.name}</span><span class="song-artist">${song.artist}</span></div><button class="remove-btn" onclick="removeSong('${song.name.replace(/'/g, "\\'")}', this)">✕ Remove</button>`;
                list.appendChild(item);
            });
        }

        function removeSong(songName, btn) {
            let songs = JSON.parse(localStorage.getItem("practicingSongs") || "[]");
            songs = songs.filter(s => s.name !== songName);
            localStorage.setItem("practicingSongs", JSON.stringify(songs));
            btn.closest(".practicing-song").remove();
            if (songs.length === 0) document.getElementById("practicingList").innerHTML = '<span class="empty-msg">No tracks yet.<br>Go to <a href="/">Home</a> and hit 🎯 Practice!</span>';
            fetch("/api/progress", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ learned: JSON.parse(localStorage.getItem("learnedSongs") || "[]"), practicing: songs }) }).catch(() => {});
        }

        loadPracticeList();
    </script>
</body>
</html>
